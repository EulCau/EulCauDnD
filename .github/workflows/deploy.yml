name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Build 🏗️
        run: npm run build
        env:
          # 这里会读取你在 GitHub 仓库设置中配置的 Secret
          # 对应 vite.config.ts 中的 loadEnv 读取逻辑
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 构建后的输出目录
          branch: gh-pages # 部署到的分支名称
